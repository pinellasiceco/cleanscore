<!DOCTYPE html>
<html>
<head>
  <title>CleanScore — Data Check</title>
  <meta charset="utf-8">
</head>
<body style="font-family:sans-serif;padding:20px;max-width:600px">
  <h1>CleanScore Data Pipeline Check</h1>
  <div id="status">Loading...</div>
  <div id="sample"></div>

  <script>
    const VIOLATIONS_URL =
      'https://kbyqatbkqqhuasbjlcwe.supabase.co'
      + '/storage/v1/object/public/cleanscore'
      + '/cleanscore_violations.json';

    fetch(VIOLATIONS_URL)
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').innerHTML =
          '<strong>✅ Data flowing</strong><br>'
          + data.length + ' Pinellas businesses loaded';

        var sample = data.slice(0, 5).map(function(b) {
          return '<li>' + b.name + ' — '
            + b.city + ' — '
            + b.violation_count + ' violations</li>';
        }).join('');

        document.getElementById('sample').innerHTML =
          '<h3>Sample records:</h3><ul>' + sample + '</ul>';
      })
      .catch(err => {
        document.getElementById('status').innerHTML =
          '❌ Error: ' + err.message;
      });
  </script>
</body>
</html>
