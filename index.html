<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CleanScore — Pinellas Restaurant Compliance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--red:#C0392B;--red-dark:#96281B;--red-light:#FADBD8;--bg-dark:#1A0A09;--green:#27AE60;--amber:#E67E22;--gray-light:#F8F9FA;--gray-border:#E9ECEF;--gray-text:#6C757D;--text-dark:#1A1A1A;--text-med:#4A4A4A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-light);color:var(--text-dark);}
.hdr{background:var(--bg-dark);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hdr-logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;letter-spacing:-.5px;}
.hdr-sub{font-size:11px;color:#888;text-align:right;line-height:1.4;}
.page{padding-bottom:140px;}
.card{background:#fff;border-radius:12px;margin:12px 16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.biz-name{font-size:19px;font-weight:700;margin-bottom:4px;}
.biz-addr{font-size:14px;color:var(--gray-text);margin-bottom:3px;}
.biz-insp{font-size:13px;color:var(--gray-text);}
.score-hero{border-radius:12px;margin:12px 16px;padding:26px 20px 22px;text-align:center;color:#fff;}
.score-num{font-size:76px;font-weight:800;line-height:1;margin-bottom:6px;}
.score-lbl{font-size:15px;font-weight:700;letter-spacing:1px;margin-bottom:4px;}
.score-sub{font-size:13px;opacity:.85;margin-bottom:14px;}
.score-bar-bg{height:10px;border-radius:8px;background:rgba(255,255,255,.25);max-width:280px;margin:0 auto;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:8px;background:rgba(255,255,255,.8);}
.score-counts{margin-top:12px;font-size:13px;opacity:.9;}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-text);margin:18px 16px 6px;}
.insp-date{font-weight:600;margin-bottom:6px;}
.insp-disp{font-size:14px;color:var(--gray-text);margin-bottom:10px;}
.cb-warn{background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:12px;}
.cb-warn-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#E65100;margin-bottom:4px;}
.cb-warn-txt{font-size:13px;color:var(--text-med);line-height:1.5;}
.vcard{background:#fff;border-radius:12px;margin:10px 16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.vcard-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;min-height:56px;-webkit-tap-highlight-color:transparent;}
.vcard-hdr-l{display:flex;align-items:center;gap:10px;}
.v-icon{font-size:20px;}
.v-name{font-size:14px;font-weight:700;}
.vcard-hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.v-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.5px;white-space:nowrap;}
.badge-high{background:var(--red-light);color:var(--red);}
.badge-major{background:#FDEBD0;color:var(--amber);}
.badge-basic{background:#F2F3F4;color:#626567;}
.v-chev{font-size:11px;color:var(--gray-text);transition:transform .2s;margin-left:2px;}
.v-chev.open{transform:rotate(180deg);}
.pbox{background:#FFF5F5;border:1px solid var(--red-light);border-radius:10px;padding:14px;margin:0 16px 4px;}
.pbox-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--red);margin-bottom:6px;}
.pbox-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.pbox-desc{font-size:12px;color:var(--gray-text);margin-bottom:6px;}
.pbox-verified{font-size:11px;color:var(--green);font-weight:600;margin-bottom:8px;}
.btn-call{display:block;width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;text-align:center;min-height:44px;cursor:pointer;}
.vcard-body{display:none;padding:0 16px 16px;}
.vcard-body.open{display:block;}
.v-flags{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.v-flag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.flag-cos{background:#D5F5E3;color:var(--green);}
.flag-rep{background:var(--red-light);color:var(--red);}
.v-sec{margin-bottom:14px;}
.v-sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-text);margin-bottom:5px;}
.v-sec-txt{font-size:13px;line-height:1.55;color:var(--text-med);}
.v-obs{font-size:13px;font-style:italic;background:#FFF5F5;padding:10px 12px;border-radius:8px;border-left:3px solid var(--gray-border);line-height:1.5;color:var(--text-dark);}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 4px;}
.stat-card{background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.stat-num{font-size:26px;font-weight:800;color:var(--red);}
.stat-lbl{font-size:11px;color:var(--gray-text);line-height:1.4;margin-top:4px;}
.stat-note{font-size:12px;color:var(--gray-text);line-height:1.5;margin:8px 16px 4px;font-style:italic;}
.tl-card{background:#fff;border-radius:12px;margin:12px 16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.tl-row{display:flex;align-items:flex-start;gap:14px;position:relative;}
.tl-row:not(:last-child){padding-bottom:20px;}
.tl-row:not(:last-child)::after{content:'';position:absolute;left:13px;top:28px;width:2px;bottom:0;background:var(--gray-border);}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.dot-red{background:var(--red-light);color:var(--red);}
.dot-amber{background:#FDEBD0;color:var(--amber);}
.dot-gray{background:var(--gray-border);color:var(--gray-text);}
.tl-step{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray-text);}
.tl-desc{font-size:14px;font-weight:600;color:var(--text-dark);margin-top:1px;}
.tl-note{font-size:12px;color:var(--gray-text);margin-top:2px;line-height:1.4;}
.cta-footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg-dark);padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));box-shadow:0 -4px 20px rgba(0,0,0,.35);z-index:100;}
.cta-hl{font-size:13px;color:#bbb;text-align:center;margin-bottom:10px;}
.cta-btns{display:flex;gap:8px;}
.btn-cta-p{flex:1;padding:13px 8px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;min-height:44px;}
.btn-cta-s{flex:1;padding:13px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;min-height:44px;}
.search-pg{min-height:calc(100vh - 48px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.search-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
.search-tag{font-size:17px;color:var(--text-med);margin-bottom:28px;}
.search-form{width:100%;max-width:380px;}
.search-inp{width:100%;padding:14px 16px;font-size:16px;border:2px solid var(--gray-border);border-radius:12px;outline:none;margin-bottom:10px;min-height:44px;-webkit-appearance:none;background:#fff;color:var(--text-dark);}
.search-inp:focus{border-color:var(--red);}
.btn-go{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;min-height:44px;}
.search-powered{font-size:12px;color:var(--gray-text);margin-top:20px;}
.search-results{width:100%;max-width:380px;margin-top:14px;text-align:left;}
.sr-item{background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;min-height:44px;}
.sr-name{font-size:14px;font-weight:600;}
.sr-city{font-size:12px;color:var(--gray-text);margin-top:2px;}
.sr-arr{color:var(--gray-text);font-size:18px;}
.search-none{font-size:14px;color:var(--gray-text);margin-top:10px;}
.state-pg{padding:60px 24px;text-align:center;}
.state-icon{font-size:48px;margin-bottom:14px;}
.state-ttl{font-size:21px;font-weight:700;margin-bottom:10px;}
.state-txt{font-size:15px;color:var(--text-med);line-height:1.6;margin-bottom:20px;}
.state-list{text-align:left;display:inline-block;font-size:14px;color:var(--gray-text);line-height:2;margin-bottom:20px;}
.btn-link{display:inline-block;padding:12px 24px;background:var(--red);color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;border:none;cursor:pointer;}
.loading-pg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading-logo{display:flex;align-items:center;gap:10px;font-size:28px;font-weight:800;}
.loading-txt{font-size:15px;color:var(--gray-text);}
.intel-card{background:#fff;border-radius:12px;margin:10px 16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.intel-hdr{font-size:14px;font-weight:700;color:var(--text-dark);margin-bottom:4px;}
.intel-sub{font-size:12px;color:var(--gray-text);line-height:1.5;margin-bottom:12px;}
.intel-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--gray-border);}
.intel-row:last-child{border-bottom:none;}
.intel-lbl{font-size:13px;color:var(--text-med);}
.intel-val{font-size:13px;font-weight:700;color:var(--text-dark);text-align:right;}
</style>
</head>
<body>
<div id="hdr"></div>
<main id="main"></main>
<div id="cta"></div>
<script>
// ── Supabase ──────────────────────────────────────────────────────────────
var CS_SUPABASE_URL='https://kbyqatbkqqhuasbjlcwe.supabase.co';
var CS_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieXFhdGJrcXFodWFzYmpsY3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTQxMzcsImV4cCI6MjA5Mjc5MDEzN30.9JGGiFV_elkQo_AjBjf-ssmeHQP6TI_AxDrMeHUtP4M';
var csDb=null;
try{csDb=supabase.createClient(CS_SUPABASE_URL,CS_ANON_KEY);}catch(e){console.error('Supabase init:',e);}

// ── Data endpoints ────────────────────────────────────────────────────────
var VIOLATIONS_URL='https://kbyqatbkqqhuasbjlcwe.supabase.co/storage/v1/object/public/cleanscore/cleanscore_violations.json';
var PARTNERS_URL='https://kbyqatbkqqhuasbjlcwe.supabase.co/storage/v1/object/public/cleanscore/cleanscore_partners.json';
var STATS_URL='https://kbyqatbkqqhuasbjlcwe.supabase.co/storage/v1/object/public/cleanscore/cleanscore_stats.json';
var PINELLAS_ICE_CO={name:'Pinellas Ice Co',type:'ice',phone:'7278556873',city:'Clearwater',description:'Ice Machine Cleaning & Sanitizing',verified:true};
// Replace with the real Stripe payment link URL after creating the product in Stripe Dashboard.
// How: Dashboard → Payment Links → Create new → "CleanScore Annual Subscription" $149/year
// Format: https://buy.stripe.com/xxxxxxxxxxxxxxxxx
var STRIPE_PAYMENT_LINK_URL='https://buy.stripe.com/6oUcMXh090R60a677H8og00';
var CATEGORY_PARTNER_TYPE={ice_machine:'ice',pest:'pest',hood:'hood',equipment:'refrig',temperature:'refrig'};
var CATEGORY_META={
  ice_machine:{icon:'🧊',label:'Ice Machine Sanitation'},
  temperature:{icon:'🌡️',label:'Temperature Control'},
  hand_washing:{icon:'🤲',label:'Hand Washing / Employee Hygiene'},
  food_storage:{icon:'📦',label:'Food Storage'},
  food_contact:{icon:'🔪',label:'Food Contact Surfaces'},
  pest:{icon:'🐀',label:'Pest Activity'},
  hood:{icon:'🔥',label:'Hood / Ventilation'},
  employee_training:{icon:'📋',label:'Employee Training / Certification'},
  plumbing:{icon:'🚿',label:'Plumbing'},
  equipment:{icon:'❄️',label:'Equipment Condition'},
  premises:{icon:'🧹',label:'General Sanitation'},
  other:{icon:'⚠️',label:'Other Violation'},
};

// ── Global state ──────────────────────────────────────────────────────────
var currentBusiness=null;
var _actions=[];
var _violations=[];
var _partners=[];
var _pendingFiles=[];
var _loadedSOPs={};
var _stats=null;

// ── Utilities ─────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtPhone(p){var d=String(p||'').replace(/\D/g,'');return d.length===10?'('+d.slice(0,3)+') '+d.slice(3,6)+'-'+d.slice(6):p||'';}
function fmtDate(s){if(!s)return '';try{var d=new Date(s+'T12:00:00Z');return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(e){return s;}}
function scoreLabel(s){return s>=80?'GOOD':s>=60?'NEEDS ATTENTION':'AT RISK';}
function scoreColor(s){return s>=80?'#27AE60':s>=60?'#E67E22':'#C0392B';}
function getPartners(cat,all){var pt=CATEGORY_PARTNER_TYPE[cat];if(!pt)return[];return(all||[]).filter(function(p){return p.type&&p.type.toLowerCase().includes(pt);}).sort(function(a,b){return(b.fit_score||0)-(a.fit_score||0);}).slice(0,2);}
function getBusinessId(biz){var p=new URLSearchParams(window.location.search);return p.get('id')||p.get('license')||(biz?String(biz.id||biz.license||''):'');}

function calcScoreWithActions(biz,actions){
  var s=100;
  (biz.violations||[]).forEach(function(v,i){
    if(v.corrected_on_site)return;
    if((actions||[]).some(function(a){return a.violation_index===i;}))return;
    if(v.severity==='high')s-=18;
    else if(v.severity==='major')s-=10;
    else s-=5;
    if(v.repeat)s-=5;
  });
  // Citation history hard ceilings
  var hist=(biz.inspection_history||[]);
  var citedCount=hist.filter(function(h){return(h.violation_count||h.violations_count||0)>0||h.had_violations;}).length;
  if(citedCount>=3)s=Math.min(s,65);
  else if(citedCount>=2)s=Math.min(s,75);
  return Math.max(0,Math.min(100,s));
}

function showToast(msg){
  var ex=document.getElementById('cs-toast');if(ex)ex.remove();
  var t=document.createElement('div');t.id='cs-toast';
  t.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));left:50%;'
    +'transform:translateX(-50%);background:#1A0A09;color:#fff;padding:10px 20px;'
    +'border-radius:20px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;'
    +'font-family:-apple-system,sans-serif';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.remove();},2500);
}

// ── Supabase data ─────────────────────────────────────────────────────────
async function loadActionsForBusiness(businessId){
  if(!csDb||!businessId)return[];
  try{
    var r=await csDb.from('cs_actions').select('*').eq('business_id',businessId);
    return r.data||[];
  }catch(e){console.error('loadActions:',e);return[];}
}

async function loadActionsByToken(token){
  if(!csDb||!token)return[];
  try{
    var r=await csDb.from('cs_actions').select('*').eq('share_token',token);
    return r.data||[];
  }catch(e){console.error('loadByToken:',e);return[];}
}

// ── Rendering helpers ─────────────────────────────────────────────────────
function logoSvg(rc,h){
  rc=rc||'#1E2D5A';h=h||24;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" height="'+h+'" fill="none" aria-hidden="true" style="flex-shrink:0">'
    +'<circle cx="20" cy="20" r="17" stroke="'+rc+'" stroke-width="2.5"/>'
    +'<path d="M27 12 Q20 14 15 22 Q13 27 17 29 Q21 31 23 26 Q26 20 27 12Z" fill="#C0392B"/>'
    +'</svg>';
}
function toggleCard(idx){var b=document.getElementById('vb-'+idx),c=document.getElementById('vc-'+idx);if(!b)return;var o=b.classList.toggle('open');if(c)c.classList.toggle('open',o);}
function renderHeader(){document.getElementById('hdr').innerHTML='<header class="hdr"><div class="hdr-logo">'+logoSvg('#fff',28)+'<span><span style="color:#fff">Clean</span><span style="color:#C0392B">Score</span></span></div><div class="hdr-sub">Powered by<br>Pinellas Ice Co</div></header>';}
function pboxHtml(p,verified){var ph=fmtPhone(p.phone);return '<div class="pbox"><div class="pbox-hdr">🔧 Recommended Provider</div><div class="pbox-name">'+esc(p.name)+'</div><div class="pbox-desc">'+esc(p.description||p.city||'')+'</div>'+(verified?'<div class="pbox-verified">✓ Verified Partner</div>':'')+(p.phone?'<a href="tel:'+esc(p.phone)+'" class="btn-call">📞 Call '+esc(ph)+'</a>':'')+'</div>';}

function scoreHeroHtml(score){
  var sc=scoreColor(score);
  var viols=currentBusiness?(currentBusiness.violations||[]):[];
  var open=viols.filter(function(v){return !v.corrected_on_site;});
  var rpt=open.filter(function(v){return v.repeat;});
  return '<div class="score-hero" style="background:'+sc+'">'
    +'<div class="score-num">'+score+'</div>'
    +'<div class="score-lbl">'+scoreLabel(score)+'</div>'
    +'<div class="score-sub">CleanScore out of 100</div>'
    +'<div class="score-bar-bg"><div class="score-bar-fill" style="width:'+score+'%"></div></div>'
    +'<div class="score-counts">'+open.length+' open violation'+(open.length!==1?'s':'')
    +(rpt.length?' · '+rpt.length+' repeat':'')+'</div>'
    +'</div>';
}

function shareBtnHtml(){
  if(!_actions.length)return'';
  return'<div style="padding:0 16px 16px">'
    +'<button id="share-btn"'
    +' ontouchend="event.preventDefault();openShareFlow()"'
    +' onclick="openShareFlow()"'
    +' style="width:100%;padding:14px;background:#1A0A09;color:#fff;border:none;'
    +'border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;'
    +'cursor:pointer;touch-action:manipulation">'
    +'📋 Generate Inspector Report</button></div>';
}

function renderViolations(){
  var el=document.getElementById('viols-section');
  if(!el||!currentBusiness)return;
  el.innerHTML=(currentBusiness.violations||[]).map(function(v,i){return violCardHtml(v,i,_partners,_actions);}).join('');
}

function updateScoreDisplay(){
  if(!currentBusiness)return;
  var score=calcScoreWithActions(currentBusiness,_actions);
  var el=document.getElementById('score-hero-wrap');
  if(el)el.innerHTML=scoreHeroHtml(score);
  var sa=document.getElementById('share-area');
  if(sa)sa.innerHTML=shareBtnHtml();
}

function violCardHtml(v,idx,allP,actions){
  var act=(actions||_actions).find(function(a){return a.violation_index===idx;});
  var meta=CATEGORY_META[v.category]||CATEGORY_META.other;
  var bc=act?'#27AE60':(v.severity==='high'?'#C0392B':v.severity==='major'?'#E67E22':'#95A5A6');
  var bclass=v.severity==='high'?'badge-high':v.severity==='major'?'badge-major':'badge-basic';
  var blabel=v.severity==='high'?'HIGH PRIORITY':v.severity==='major'?'MAJOR':'BASIC';
  var flags='';
  if(v.corrected_on_site)flags+='<span class="v-flag flag-cos">✓ Corrected On-Site</span>';
  if(v.repeat)flags+='<span class="v-flag flag-rep">⚠ Repeat</span>';
  var pb='';
  if(v.category==='ice_machine'){pb=pboxHtml(PINELLAS_ICE_CO,true);}
  else if(CATEGORY_PARTNER_TYPE[v.category]){var m=getPartners(v.category,allP);if(m.length)pb=pboxHtml(m[0],false);}
  var actionState;
  if(act){
    actionState='<div style="background:#D5F5E3;border:1px solid #27AE60;border-radius:8px;'
      +'padding:12px;margin-top:12px">'
      +'<div style="font-size:12px;font-weight:700;color:#1E8449;margin-bottom:4px">✅ Action Logged</div>'
      +'<div style="font-size:13px;color:#1E8449">'+esc(act.action_text.slice(0,100)+(act.action_text.length>100?'...':''))+'</div>'
      +'<div style="font-size:11px;color:#27AE60;margin-top:4px">'+esc(act.action_date)+'</div>'
      +(act.doc_urls&&act.doc_urls.length?'<div style="font-size:11px;color:#27AE60;margin-top:2px">📎 '+act.doc_urls.length+' document(s) attached</div>':'')
      +'</div>'
      +'<button data-eidx="'+idx+'" data-ecat="'+esc(v.category)+'"'
      +' ontouchend="event.preventDefault();openActionLog(parseInt(this.dataset.eidx),this.dataset.ecat)"'
      +' onclick="openActionLog(parseInt(this.dataset.eidx),this.dataset.ecat)"'
      +' style="width:100%;padding:10px;background:#fff;border:1px solid #27AE60;'

function renderInspectionTimeline(biz){
  var hist=biz.inspection_history;
  if(!hist||!hist.length)return'';
  var recent=hist.slice(-8);
  var max=1;
  recent.forEach(function(h){var vc=h.violation_count||h.violations_count||0;if(vc>max)max=vc;});
  var barW=28,barGap=6,chartH=60,labelH=18;
  var totalW=(barW+barGap)*recent.length-barGap;
  var bars=recent.map(function(h,i){
    var vc=h.violation_count||h.violations_count||0;
    var bh=vc>0?Math.max(4,Math.round((vc/max)*chartH)):4;
    var by=chartH-bh;
    var col=h.had_v22?'#C0392B':vc>0?'#E67E22':'#27AE60';
    var x=i*(barW+barGap);
    var yr=h.inspection_year||(h.inspection_date?String(h.inspection_date).slice(2,4):(h.date?String(h.date).slice(2,4):''));
    return'<rect x="'+x+'" y="'+by+'" width="'+barW+'" height="'+bh+'" rx="3" fill="'+col+'"/>'
      +'<text x="'+(x+barW/2)+'" y="'+(chartH+labelH-2)+'" text-anchor="middle" font-size="9" fill="#9E9E9E">'+esc(String(yr))+'</text>';
  }).join('');
  var lastH=recent[recent.length-1];
  var prevH=recent.length>1?recent[recent.length-2]:null;
  var trend='';
  if(lastH&&prevH){
    var lvc=lastH.violation_count||lastH.violations_count||0;
    var pvc=prevH.violation_count||prevH.violations_count||0;
    if(lvc<pvc)trend='Violations trending down — good progress.';
    else if(lvc>pvc)trend='Violations trending up — focus on corrections.';
    else if(lvc===0)trend='Clean inspections across last two periods.';
    else trend='Violation count unchanged from prior inspection.';
  }
  return'<div class="sec-lbl">Inspection History</div>'
    +'<div class="card">'
    +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+totalW+' '+(chartH+labelH)+'" style="display:block;width:100%;max-height:80px">'
    +bars
    +'</svg>'
    +'<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-text)"><span style="width:10px;height:10px;border-radius:2px;background:#C0392B;flex-shrink:0;display:inline-block"></span>V22 Violation</div>'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-text)"><span style="width:10px;height:10px;border-radius:2px;background:#E67E22;flex-shrink:0;display:inline-block"></span>Other Violations</div>'
    +'<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--gray-text)"><span style="width:10px;height:10px;border-radius:2px;background:#27AE60;flex-shrink:0;display:inline-block"></span>Clean</div>'
    +'</div>'
    +(trend?'<div style="font-size:12px;color:var(--gray-text);margin-top:8px;font-style:italic">'+esc(trend)+'</div>':'')
    +'</div>';
}

function _inferBizType(name){
  var n=(name||'').toLowerCase();
  if(/\bbar\b|\btavern\b|\blounge\b|\bnightclub\b|\bbrewery\b|\bsaloon\b/.test(n))return'bar';
  if(/\bcafe\b|\bcoffee\b|\bbakery\b|\bdeli\b|\bbagel\b|\bpastry\b|\bdonut\b/.test(n))return'cafe';
  if(/\bhotel\b|\binn\b|\bresort\b|\bsuites\b|\bmotel\b/.test(n))return'hotel';
  if(/\bschool\b|\belementary\b|\buniversity\b|\bcollege\b|\bcafeteria\b/.test(n))return'institutional';
  if(/\bpizza\b|\bsubway\b|\bmcdonald|\bwendy\b|\bdomino\b/.test(n))return'fast_food';
  return'restaurant';
}

function renderRepeatRisk(biz,stats){
  var repCat=(stats&&stats.repeat_risk&&stats.repeat_risk.by_category)||{};
  var overall=(stats&&stats.repeat_risk&&stats.repeat_risk.overall)||{};
  if(!overall.total_violations)return'';
  var seen={};var cats=[];
  (biz.violations||[]).forEach(function(v){if(v.category&&!seen[v.category]&&repCat[v.category]){seen[v.category]=true;cats.push(v.category);}});

var _viols=[];
function doSearch(){
  var inp=document.getElementById('sinp');if(!inp)return;
  var q=inp.value.trim();if(!q)return;
  var el=document.getElementById('sres');if(!el)return;
  var isNum=/^\d+$/.test(q),res;
  if(isNum){res=_viols.filter(function(b){return String(b.id)===q||String(b.license)===q;});}
  else{var ql=q.toLowerCase();res=_viols.filter(function(b){return(b.name||'').toLowerCase().includes(ql)||(b.city||'').toLowerCase().includes(ql);});}
  if(!res.length){el.innerHTML='<div class="search-none">No results found in Pinellas County for "'+esc(q)+'"</div>';return;}
  if(res.length===1){window.location.href='?id='+encodeURIComponent(res[0].id);return;}
  var html=res.slice(0,10).map(function(b){return'<div class="sr-item" onclick="window.location.href=\'?id='+encodeURIComponent(b.id)+'\'"><div><div class="sr-name">'+esc(b.name)+'</div><div class="sr-city">'+esc(b.city)+(b.last_inspection_date?' · '+b.last_inspection_date:'')+'</div></div><div class="sr-arr">›</div></div>';}).join('');
  if(res.length>10)html+='<div class="search-none">Showing 10 of '+res.length+' results. Try a more specific name.</div>';
  el.innerHTML=html;
}

async function loadSOP(vidx,vtext,vcode){
  var container=document.getElementById('sop-'+vidx);
  if(!container)return;
  if(_loadedSOPs[vidx]){
    var ex=document.getElementById('sop-content-'+vidx);
    if(ex)ex.style.display='block';
    var showBtn=document.getElementById('sop-show-'+vidx);
    if(showBtn)showBtn.style.display='none';
    return;
  }
  container.innerHTML='<div style="padding:12px;background:#FFF5F5;border-radius:8px;font-size:13px;color:#C0392B;text-align:center">✦ Generating remedy guide...</div>';
  try{
    var r=await fetch(CS_SUPABASE_URL+'/functions/v1/cs-generate-sop',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CS_ANON_KEY},
      body:JSON.stringify({violation_text:vtext,violation_code:vcode||null,business_type:'restaurant'})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(!d.sop)throw new Error('No SOP in response');
    _loadedSOPs[vidx]=d.sop;
    container.innerHTML=renderSOPContent(vidx,d.sop);
  }catch(e){
    console.error('SOP load error:',e);
    container.innerHTML='<div style="padding:12px;background:#FFF5F5;border-radius:8px;font-size:13px;color:#C0392B">'
      +'Could not generate remedy guide. '
      +'<button data-vidx="'+vidx+'" ontouchend="event.preventDefault();retryLoadSOP(parseInt(this.dataset.vidx))" onclick="retryLoadSOP(parseInt(this.dataset.vidx))" style="display:block;margin-top:8px;padding:8px 16px;background:#C0392B;color:#fff;border:none;border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;touch-action:manipulation">Retry</button>'
      +'</div>';
  }
}

function retryLoadSOP(vidx){
  var v=currentBusiness&&currentBusiness.violations?currentBusiness.violations[vidx]:null;
  if(v)loadSOP(vidx,v.text||'',v.code||'');
}

function handleFileSelection(files){

    _pendingFiles.push(file);
  });
  preview.innerHTML=_pendingFiles.map(function(f,i){
    return'<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#F8F9FA;border-radius:6px;margin-bottom:6px;font-size:13px">'

      +'</div>';
  }).join('');
}

function removeFile(index){
  _pendingFiles.splice(index,1);
  handleFileSelection([]);
}

async function uploadFiles(businessId,violationIndex){
  var urls=[];
  for(var i=0;i<_pendingFiles.length;i++){
    var file=_pendingFiles[i];
    var path=businessId+'/'+violationIndex+'/'+Date.now()+'_'+file.name;
    try{
      var up=await csDb.storage.from('cs-docs').upload(path,file,{upsert:true});
      if(!up.error){
        var pu=csDb.storage.from('cs-docs').getPublicUrl(path);
        urls.push(pu.data.publicUrl);
      }
    }catch(e){console.error('Upload error:',e);}
  }
  return urls;
}

async function saveActionLog(vidx,vcat){
  var text=(document.getElementById('al-text')||{}).value||'';
  var dateVal=(document.getElementById('al-date')||{}).value||'';
  var saveBtn=document.getElementById('al-save-btn');
  if(!text.trim()){showToast('Please describe what you did');return;}
  if(!dateVal){showToast('Please select a date');return;}
  if(!csDb){showToast('Supabase not initialised — reload and try again');return;}
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving...';}
  var businessId=getBusinessId(currentBusiness);
  console.log('[CS] saveAction business='+businessId+' vidx='+vidx+' vcat='+vcat);
  var docUrls=[];
  if(_pendingFiles.length>0)docUrls=await uploadFiles(businessId,vidx);
  var existing=_actions.find(function(a){return a.violation_index===vidx;});
  try{
    if(existing){
      var allDocs=(existing.doc_urls||[]).concat(docUrls);
      var upd=await csDb.from('cs_actions').update({action_text:text.trim(),action_date:dateVal,doc_urls:allDocs,updated_at:new Date().toISOString()}).eq('id',existing.id);
      console.log('[CS] update result',upd);
      if(upd.error)throw new Error(upd.error.message||'Update failed');
      existing.action_text=text.trim();existing.action_date=dateVal;existing.doc_urls=allDocs;
    }else{
      var payload={business_id:businessId,violation_index:vidx,violation_category:vcat,action_text:text.trim(),action_date:dateVal,doc_urls:docUrls};
      console.log('[CS] inserting',payload);
      var ins=await csDb.from('cs_actions').insert(payload).select().single();
      console.log('[CS] insert result',ins);
      if(ins.error)throw new Error(ins.error.message||'Insert failed');
      if(ins.data)_actions.push(ins.data);
    }
    closeActionLog();
    _pendingFiles=[];
    renderViolations();
    updateScoreDisplay();
    if(_actions.length===1){
      setTimeout(function(){var btn=document.getElementById('share-btn');if(btn)btn.scrollIntoView({behavior:'smooth',block:'center'});},350);
    }
    showToast('Action saved — score updated');
  }catch(e){
    console.error('[CS] save error',e);
    showToast('Save failed: '+(e.message||'check console'));
    if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='Save Action';}
  }
}

function copyShareLink(url){

    navigator.clipboard.writeText(url).then(function(){
      var btn=document.getElementById('copy-share-btn');
      if(btn)btn.textContent='✓ Copied!';
      setTimeout(function(){var btn=document.getElementById('copy-share-btn');if(btn)btn.textContent='📋 Copy Link';},2000);
    });

}

function nativeShare(url){

  var business=_violations.find(function(b){return b.id===businessId||b.license===businessId;});

  var sc=scoreColor(score);
  var sl=scoreLabel(score);
  var today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

      +'<span style="font-size:14px;font-weight:700;color:#1A1A1A">'+esc(sop.label)+'</span>'
      +'</div>'

// ── Business record helpers ───────────────────────────────────────────────
async function ensureBusinessRecord(businessId,currentInspectionDate){
  if(!csDb||!businessId)return{tier:'free',isNewInspection:false};
  try{
    var r=await csDb.from('cs_businesses').select('*').eq('business_id',businessId).maybeSingle();
    if(r.error)throw r.error;
    if(!r.data){
      await csDb.from('cs_businesses').insert({business_id:businessId,tier:'free',last_seen_inspection_date:currentInspectionDate||null});
      return{tier:'free',isNewInspection:false};
    }
    var d=r.data;
    var isNew=!!(d.last_seen_inspection_date&&currentInspectionDate&&currentInspectionDate>d.last_seen_inspection_date);
    return{tier:d.tier||'free',email:d.email,isNewInspection:isNew,lastSeenDate:d.last_seen_inspection_date,subscriptionExpiresAt:d.subscription_expires_at};
  }catch(e){console.error('ensureBusinessRecord:',e);return{tier:'free',isNewInspection:false};}
}

async function checkSubscriptionValid(bizRecord){
  if(bizRecord.tier!=='paid')return false;
  if(!bizRecord.subscriptionExpiresAt)return false;
  return new Date(bizRecord.subscriptionExpiresAt)>new Date();
}

function closeEmailCapture(){var bg=document.getElementById('email-bg');if(bg)bg.remove();}

async function proceedToStripe(businessId){
  var email=(document.getElementById('checkout-email')||{}).value||'';
  if(!email||!email.includes('@')){showToast('Please enter a valid email address');return;}
  var btn=document.getElementById('checkout-btn');
  if(btn){btn.disabled=true;btn.textContent='Redirecting...';}
  if(csDb){
    await csDb.from('cs_businesses').upsert({
      business_id:businessId,email:email,updated_at:new Date().toISOString()
    },{onConflict:'business_id'});
  }
  localStorage.setItem('cs_pending_business_id',businessId);
  localStorage.setItem('cs_pending_email',email);
  var stripeUrl=STRIPE_PAYMENT_LINK_URL
    +'?prefilled_email='+encodeURIComponent(email)
    +'&client_reference_id='+encodeURIComponent(businessId);
  window.location.href=stripeUrl;
}

// ── Payment success ───────────────────────────────────────────────────────
async function handlePaymentSuccess(sessionId){
  var businessId=localStorage.getItem('cs_pending_business_id');
  renderHeader();
  document.getElementById('cta').innerHTML='';
  if(!businessId){
    document.getElementById('main').innerHTML='<div class="state-pg"><div class="state-icon">✅</div><div class="state-ttl">Payment received!</div><div class="state-txt">Thank you. <a href="/" class="btn-link" style="display:inline;padding:0;background:none;color:var(--red)">Search for your business →</a></div></div>';
    return;
  }
  document.getElementById('main').innerHTML='<div class="state-pg"><div class="state-icon">⏳</div><div class="state-ttl">Activating your account...</div><div class="state-txt">Payment confirmed — setting up your CleanScore subscription.</div></div>';
  var attempts=0;
  var poll=setInterval(async function(){
    attempts++;
    try{
      var r=await csDb.from('cs_businesses').select('tier,subscription_expires_at').eq('business_id',businessId).maybeSingle();
      if((r.data&&r.data.tier==='paid')||attempts>=10){
        clearInterval(poll);
        localStorage.removeItem('cs_pending_business_id');
        localStorage.removeItem('cs_pending_email');
        showToast(r.data&&r.data.tier==='paid'?'Access unlocked — welcome to CleanScore!':'Payment received — access will activate shortly');
        setTimeout(function(){window.location.href='/?id='+encodeURIComponent(businessId);},1500);
      }
    }catch(e){
      if(attempts>=10){clearInterval(poll);setTimeout(function(){window.location.href='/?id='+encodeURIComponent(businessId);},2000);}
    }
  },2000);
}

// ── Stats fetch ───────────────────────────────────────────────────────────
async function fetchStats(){
  try{var r=await fetch(STATS_URL);if(r.ok)_stats=await r.json();}
  catch(e){console.warn('CleanScore stats unavailable');}
}

// ── Init ──────────────────────────────────────────────────────────────────
async function init(){
  var p=new URLSearchParams(window.location.search);

  // Handle Stripe return before data load (only needs Supabase, not violations)
  if(p.get('payment')==='success'){await handlePaymentSuccess(p.get('session'));return;}

  renderHeader();
  document.getElementById('main').innerHTML='<div class="loading-pg"><div class="loading-logo">'+logoSvg('#1E2D5A',40)+'<span><span style="color:#1A1A1A">Clean</span><span style="color:#C0392B">Score</span></span></div><div class="loading-txt">Loading report...</div></div>';
  var viols,partners;
  try{
    var res=await Promise.all([fetch(VIOLATIONS_URL),fetch(PARTNERS_URL),fetchStats()]);
    viols=await res[0].json();if(!Array.isArray(viols))viols=[];
    try{partners=await res[1].json();}catch(e){partners=[];}
    if(!Array.isArray(partners))partners=[];
  }catch(e){renderError();return;}
  _violations=viols;_viols=viols;
  _partners=partners;

  var verifyToken=p.get('verify');
  var idP=p.get('id'),licP=p.get('license'),qP=p.get('q');
  if(verifyToken){await renderVerifyPage(verifyToken);return;}
  if(!idP&&!licP&&!qP){renderSearch();return;}
  if(qP){renderSearch(qP);return;}

  var biz=null;
  if(idP)biz=viols.find(function(b){return String(b.id)===String(idP);});
  else if(licP)biz=viols.find(function(b){return String(b.license)===String(licP)||String(b.id)===String(licP);});
  if(!biz){renderNotFound();return;}
  if(!biz.violations||!biz.violations.length){renderNoViolations(biz);return;}

  currentBusiness=biz;
  var businessId=getBusinessId(biz);

  // Load actions + business record in parallel
  var rr=await Promise.all([
    loadActionsForBusiness(businessId),
    ensureBusinessRecord(businessId,biz.last_inspection_date)
  ]);
  _actions=rr[0];
  var bizRecord=rr[1];
  var isPaid=await checkSubscriptionValid(bizRecord);

  // New inspection + free tier = paywall
  if(bizRecord.isNewInspection&&!isPaid){renderPaywall(biz,bizRecord);return;}

  // Paid + new inspection: advance last_seen so they won't be paywalled again
  if(isPaid&&bizRecord.isNewInspection){
    csDb.from('cs_businesses').update({last_seen_inspection_date:biz.last_inspection_date,updated_at:new Date().toISOString()}).eq('business_id',businessId).then(function(){});
  }

  renderReport(biz,calcScoreWithActions(biz,_actions),_actions,_partners);
}

init();
</script>
